/* NAVBAR GLASS */
.navbar{
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
box-shadow:0 0 25px rgba(212,175,55,0.3);
border-bottom:1px solid rgba(212,175,55,0.2);

.nav-link{
color:#f5f5dc !important;

}

.nav-link:hover{

/* ===============================
   LOGO ULTRA PREMIUM 3D GRAMMY
================================ */

.logo-wrapper{
position:relative;
display:inline-block;
perspective:800px;
}

.logo-img{
height:110px;   /* LOGO MÁS GRANDE */
max-height:120px;
position:relative;
z-index:2;
filter:
contrast(1.2)
brightness(1.1)
drop-shadow(0 5px 8px rgba(0,0,0,0.8))
drop-shadow(0 0 15px rgba(212,175,55,0.7));
transition:0.5s;
}

.logo-wrapper:hover .logo-img{
transform:scale(1.08) rotateX(8deg) rotateY(-8deg);
filter:
contrast(1.3)
brightness(1.3)
drop-shadow(0 8px 12px rgba(0,0,0,0.9))
drop-shadow(0 0 25px rgba(255,215,0,0.9));
}

/* DESTELLO JOYERÍA */
.shine{
position:absolute;
top:0;
left:-75%;
width:50%;
height:100%;
background:linear-gradient(
120deg,
transparent 0%,
rgba(255,255,255,0.9) 50%,
transparent 100%
);
transform:skewX(-25deg);
animation:shineMove 4s infinite;
z-index:3;
pointer-events:none;
}

@keyframes shineMove{
0%{ left:-75%; }
100%{ left:125%; }
}

/* HALO DORADO */
.logo-wrapper::after{
content:"";
position:absolute;
top:50%;
left:50%;
width:140%;
height:140%;
transform:translate(-50%,-50%);
background:radial-gradient(circle, rgba(212,175,55,0.4) 0%, transparent 70%);
border-radius:50%;
z-index:1;
animation:haloPulse 3s infinite ease-in-out;
}

@keyframes haloPulse{
0%{ opacity:0.5; transform:translate(-50%,-50%) scale(1); }
50%{ opacity:1; transform:translate(-50%,-50%) scale(1.15); }
100%{ opacity:0.5; transform:translate(-50%,-50%) scale(1); }
}

/* RESPONSIVE CELULAR */
@media (max-width:768px){
.logo-img{
height:75px;
}
}

/* VIDEO */
.video-container{
border-radius:20px;
overflow:hidden;
box-shadow:0 0 35px rgba(212,175,55,0.4);
}

/* REDES */

margin-top:50px;
}

.social-title{

letter-spacing:3px;
margin-bottom:25px;

.social-btn{

margin:10px;
padding:12px 30px;
border:1px solid #d4af37;
border-radius:30px;
color:#f5f5dc;
text-decoration:none;
transition:0.4s;
box-shadow:0 0 15px rgba(212,175,55,0.2);
}

.social-btn i{
margin-right:8px;
}

.social-btn:hover{
background:#d4af37;
color:#000;
box-shadow:0 0 25px rgba(212,175,55,0.7);

/* FOOTER */

padding:30px 0;

/* WHATSAPP */

position:fixed;
width:60px;
height:60px;
bottom:90px;
right:20px;
background:#25D366;
color:#FFF;
border-radius:50px;
text-align:center;
font-size:30px;
z-index:100;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.whatsapp-float i{
margin-top:16px;
}

.fade-in{
opacity:0;
transform:translateY(30px);
animation:fadeUp 1.2s ease forwards;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}
