<style>
body{
background:#000;
color:#f5f5dc;
font-family:'Segoe UI',sans-serif;
}

/* NAVBAR */
.navbar{
background:#000;
box-shadow:0 0 15px rgba(212,175,55,0.4);
padding-top:15px;
padding-bottom:15px;
}

/* ===== LOGO GRANDE IGUAL QUE BIOGRAFIA ===== */

.logo-wrapper{
position:relative;
display:inline-block;
}

.logo-img{
height:170px; /* MISMO TAMAÑO QUE BIOGRAFIA */
filter:
brightness(1.2)
contrast(1.3)
sepia(1)
hue-rotate(20deg)
saturate(6)
drop-shadow(0 0 15px rgba(212,175,55,0.9))
drop-shadow(0 0 35px rgba(255,215,0,0.7));
transition:0.5s;
}

.logo-img:hover{
transform:scale(1.08);
filter:
brightness(1.4)
contrast(1.4)
sepia(1)
hue-rotate(25deg)
saturate(8)
drop-shadow(0 0 25px rgba(255,215,0,1))
drop-shadow(0 0 50px rgba(212,175,55,1));
}

/* Destello tipo joyería */
.logo-wrapper::after{
content:"";
position:absolute;
top:0;
left:-75%;
width:50%;
height:100%;
background:linear-gradient(
120deg,
transparent 0%,
rgba(255,255,255,0.9) 50%,
transparent 100%
);
transform:skewX(-25deg);
animation:shine 4s infinite;
pointer-events:none;
}

@keyframes shine{
0%{ left:-75%; }
100%{ left:125%; }
}

/* Responsive */
@media (max-width:768px){
.logo-img{
height:110px;
}
}

.nav-link{
color:#f5f5dc !important;
}

.nav-link:hover{
color:#d4af37 !important;
}

.nav-link.active{
color:#d4af37 !important;
}

/* CONTACTO */
.contact-section{
margin-top:220px; /* Ajustado por logo grande */
}

.contact-box{
background:#111;
padding:40px;
border-radius:15px;
box-shadow:0 0 30px rgba(212,175,55,0.3);
}

.contact-title{
color:#d4af37;
letter-spacing:3px;
margin-bottom:30px;
text-align:center;
}

.form-control{
background:#000;
border:1px solid #d4af37;
color:#f5f5dc;
}

.form-control:focus{
background:#000;
color:#fff;
border-color:#fff3b0;
box-shadow:0 0 10px rgba(212,175,55,0.5);
}

.btn-gold{
background:#d4af37;
color:#000;
font-weight:bold;
}

.btn-gold:hover{
background:#fff3b0;
}

#mensajeEstado{
display:none;
margin-bottom:20px;
}

.contact-info{
margin-top:30px;
}

.contact-info i{
color:#d4af37;
margin-right:10px;
}

.footer{
background:#111;
padding:30px 0;
text-align:center;
margin-top:80px;
}

.whatsapp-float{
position:fixed;
width:60px;
height:60px;
bottom:20px;
right:20px;
background:#25D366;
color:#FFF;
border-radius:50px;
text-align:center;
font-size:30px;
z-index:100;
}

.whatsapp-float i{
margin-top:16px;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg fixed-top">

<li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
</ul>
</div>

</div>
</nav>

<!-- CONTACTO -->
<div class="container contact-section">
<div class="row justify-content-center">
<div class="col-md-8">

<div class="contact-box">

<h2 class="contact-title">CONTACTO</h2>

<div id="mensajeEstado" class="alert text-center"></div>

<form id="formContacto" action="https://formsubmit.co/ajax/olguitar123@hotmail.com" method="POST">
<input type="hidden" name="_captcha" value="false">

<div class="mb-3">
<input type="text" name="Nombre" class="form-control" placeholder="Nombre completo" required>
</div>

<div class="mb-3">
<input type="email" name="Correo" class="form-control" placeholder="Correo electrónico" required>
</div>

<div class="mb-3">
<input type="text" name="Asunto" class="form-control" placeholder="Asunto">
</div>

<div class="mb-3">
<textarea name="Mensaje" class="form-control" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
</div>

<div class="text-center">
<button type="submit" class="btn btn-gold px-5">Enviar Mensaje</button>
</div>

</form>

<div class="contact-info text-center">
<p><i class="fas fa-phone"></i> +57 316 297 9230</p>
<p><i class="fas fa-envelope"></i> olguitar123@hotmail.com</p>
<p><i class="fas fa-map-marker-alt"></i> Colombia</p>
</div>

</div>
</div>
</div>
</div>

<div class="footer">
<p>© 2026 Felipe Guzmán Official. Todos los derechos reservados.</p>
<div style="color:#d4af37;">★★★★★</div>
</div>

<a href="https://wa.me/573162979230" class="whatsapp-float" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<audio id="sonidoExito" preload="auto">
<source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
</audio>

<script>
const form = document.getElementById("formContacto");
const mensajeEstado = document.getElementById("mensajeEstado");
const sonido = document.getElementById("sonidoExito");

form.addEventListener("submit", function(e){
e.preventDefault();

fetch(form.action, {
method: "POST",
body: new FormData(form),
headers: {'Accept': 'application/json'}
})
.then(response => {
if(response.ok){
mensajeEstado.style.display="block";
mensajeEstado.className="alert alert-success text-center";
mensajeEstado.innerHTML="✅ Mensaje enviado exitosamente.";
form.reset();
sonido.play();
}else{
throw new Error("Error");
}
})
.catch(error => {
mensajeEstado.style.display="block";
mensajeEstado.className="alert alert-danger text-center";
mensajeEstado.innerHTML="❌ No fue enviado el mensaje. Intenta nuevamente.";
});
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
