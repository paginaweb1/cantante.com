<script>
const form = document.getElementById("formContacto");
const mensajeEstado = document.getElementById("mensajeEstado");
const sonido = document.getElementById("sonidoExito");

form.addEventListener("submit", function(e){
e.preventDefault();

fetch(form.action, {
method: "POST",
body: new FormData(form),
headers: {'Accept': 'application/json'}
})
.then(response => {
if(response.ok){
mensajeEstado.style.display="block";
mensajeEstado.className="alert alert-success text-center";
mensajeEstado.innerHTML="✅ Mensaje enviado exitosamente.";
form.reset();
sonido.play();
}else{
throw new Error("Error");
}
})
.catch(error => {
mensajeEstado.style.display="block";
mensajeEstado.className="alert alert-danger text-center";
mensajeEstado.innerHTML="❌ No fue enviado el mensaje. Intenta nuevamente.";
});
});
</script>
