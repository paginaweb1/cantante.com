.navbar{

.logout-btn{

}

.event-info{

}

.whatsapp-float i{ margin-top:16px; }

/* LOGIN MODAL */

<!-- MODAL LOGIN -->
<div class="modal fade" id="loginModal" tabindex="-1">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content bg-dark text-light border border-warning">

<div class="modal-header border-warning">
<h5 class="modal-title text-warning">INICIAR SESIÓN</h5>
<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input type="text" id="loginUser" class="form-control bg-black text-light border-warning">
</div>

<div class="mb-3">
<label class="form-label">Contraseña</label>
<input type="password" id="loginPass" class="form-control bg-black text-light border-warning">
</div>

<div id="loginMessage" class="text-center fw-bold"></div>
</div>

<button class="btn btn-warning w-100" onclick="login()">Ingresar</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

let isAdmin=false;

/* EVENTOS INICIALES */
if(!localStorage.getItem("events")){
localStorage.setItem("events",JSON.stringify([
{title:"Concierto Sinfónico",place:"Restaurante Concha Acústica",date:"9 de Abril",time:"8:30 p.m.",doors:"6:00 p.m.",age:"14 Años"},
{title:"Noche Acústica",place:"Restaurante Concha Acústica",date:"28 de Junio",time:"7:00 p.m.",doors:"5:30 p.m.",age:"12 Años"},
{title:"Show Internacional",place:"Restaurante Concha Acústica",date:"15 de Agosto",time:"9:00 p.m.",doors:"7:00 p.m.",age:"18 Años"}
]));
}

let events=JSON.parse(localStorage.getItem("events"));

function renderEvents(){
let container=document.getElementById("eventsContainer");
container.innerHTML="";

events.forEach((e,index)=>{
container.innerHTML+=`
<div class="event-card">
<div class="event-title">${e.title}</div>

<div class="event-info">
<div class="info-item"><i class="bi bi-geo-alt"></i><div><strong>Lugar:</strong><br>${e.place}</div></div>
<div class="info-item"><i class="bi bi-calendar"></i><div><strong>Fecha:</strong><br>${e.date}</div></div>
<div class="info-item"><i class="bi bi-clock"></i><div><strong>Hora:</strong><br>${e.time}</div></div>
<div class="info-item"><i class="bi bi-door-open"></i><div><strong>Apertura:</strong><br>${e.doors}</div></div>
<div class="info-item"><i class="bi bi-person"></i><div><strong>Edad Mínima:</strong><br>${e.age}</div></div>
</div>

<div class="mt-3 d-flex justify-content-between align-items-center">
<button class="btn-ticket" onclick="buyTicket('${e.title}')">Comprar Ticket</button>

${isAdmin ? `
<div class="admin-actions">
<button class="btn btn-success btn-sm" onclick="openCreate()">Crear</button>
<button class="btn btn-warning btn-sm" onclick="editEvent(${index})">Editar</button>
<button class="btn btn-danger btn-sm" onclick="deleteEvent(${index})">Eliminar</button>
</div>` : ``}

</div>
</div>
`;
});
}

renderEvents();

/* LOGIN */
function openLogin(){
let modal=new bootstrap.Modal(document.getElementById('loginModal'));
modal.show();
}

function login(){
let user=document.getElementById("loginUser").value;
let pass=document.getElementById("loginPass").value;
let message=document.getElementById("loginMessage");

if(user==="adminfg" && pass==="FG2026VIP"){
isAdmin=true;
document.getElementById("logoutBtn").style.display="block";
message.classList.remove("text-danger");
message.classList.add("text-success");
message.innerHTML="✨ Bienvenida Administradora ✨";

setTimeout(()=>{
bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
renderEvents();
},1500);

}else{
message.classList.remove("text-success");
message.classList.add("text-danger");
message.innerHTML="Credenciales incorrectas";
}
}

function logout(){
isAdmin=false;
document.getElementById("logoutBtn").style.display="none";
alert("Sesión cerrada correctamente");
renderEvents();
}

/* CRUD */
function openCreate(){
let title=prompt("Título:");
let place=prompt("Lugar:");
let date=prompt("Fecha:");
let time=prompt("Hora:");
let doors=prompt("Apertura:");
let age=prompt("Edad mínima:");

events.push({title,place,date,time,doors,age});
localStorage.setItem("events",JSON.stringify(events));
renderEvents();
}

function editEvent(index){
let e=events[index];
e.title=prompt("Título:",e.title);
e.place=prompt("Lugar:",e.place);
e.date=prompt("Fecha:",e.date);
e.time=prompt("Hora:",e.time);
e.doors=prompt("Apertura:",e.doors);
e.age=prompt("Edad mínima:",e.age);

localStorage.setItem("events",JSON.stringify(events));
renderEvents();
}

function deleteEvent(index){
if(confirm("¿Eliminar evento?")){
events.splice(index,1);
localStorage.setItem("events",JSON.stringify(events));
renderEvents();
}
}

function buyTicket(eventTitle){
let phone="573162979230";
let message=`Hola, quiero información sobre boletas disponibles y precios para el evento "${eventTitle}".`;
let url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
window.open(url,"_blank");
}

</script>
