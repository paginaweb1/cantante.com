<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eventos Oficiales | Felipe Guzmán</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
background:#000;
color:#f5f5dc;
font-family:'Segoe UI',sans-serif;
}

/* BOTÓN ADMIN */
.admin-btn{
position:fixed;
right:0;
top:50%;
transform:translateY(-50%);
background:linear-gradient(45deg,#d4af37,#fff3b0);
color:#000;
font-weight:bold;
padding:12px 25px;
border-radius:10px 0 0 10px;
cursor:pointer;
z-index:9999;
letter-spacing:1px;
}

.logout-btn{
position:fixed;
right:0;
top:60%;
transform:translateY(-50%);
background:#8b0000;
color:#fff;
font-weight:bold;
padding:12px 25px;
border-radius:10px 0 0 10px;
cursor:pointer;
z-index:9999;
letter-spacing:1px;
display:none;
}

.header{
margin-top:120px;
margin-bottom:60px;
text-align:center;
}

.header h1{
color:#d4af37;
letter-spacing:4px;
}

.event-card{
background:#0d0d0d;
border:1px solid #1f1f1f;
border-left:4px solid #d4af37;
padding:30px;
margin-bottom:30px;
border-radius:12px;
}

.event-title{
font-size:24px;
color:#fff;
margin-bottom:15px;
}

.event-info{
background:#f1f1f1;
color:#000;
border-radius:8px;
padding:20px;
display:flex;
flex-wrap:wrap;
gap:40px;
}

.info-item{
display:flex;
align-items:center;
gap:10px;
min-width:200px;
}

.info-item i{
color:#d4af37;
font-size:22px;
}

.btn-ticket{
background:linear-gradient(45deg,#d4af37,#fff3b0);
color:#000;
font-weight:bold;
border:none;
padding:8px 20px;
border-radius:6px;
}

.admin-actions button{
margin-left:5px;
}
</style>
</head>
<body>

<!-- BOTÓN ADMIN -->
<div class="admin-btn" onclick="openLogin()">ADMINISTRAR</div>
<div id="logoutBtn" class="logout-btn" onclick="logout()">CERRAR SESIÓN</div>

<div class="container">

<div class="header">
<h1>TICKETS OFICIALES</h1>
<p>Experiencias Exclusivas · Felipe Guzmán</p>
</div>

<div id="eventsContainer"></div>

</div>

<!-- MODAL LOGIN -->
<div class="modal fade" id="loginModal">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content bg-dark text-light border border-warning p-4">
<h5 class="text-warning">Ingreso Administrador</h5>
<input type="text" id="user" class="form-control my-2" placeholder="Usuario">
<input type="password" id="pass" class="form-control my-2" placeholder="Contraseña">
<button class="btn-ticket w-100 mt-2" onclick="login()">Ingresar</button>
</div>
</div>
</div>

<!-- MODAL CRUD -->
<div class="modal fade" id="crudModal">
<div class="modal-dialog modal-lg modal-dialog-centered">
<div class="modal-content bg-dark text-light border border-warning p-4">
<h5 class="text-warning">Crear / Editar Evento</h5>

<input type="hidden" id="eventId">
<input class="form-control my-2" id="title" placeholder="Título">
<input class="form-control my-2" id="place" placeholder="Lugar">
<input class="form-control my-2" id="date" placeholder="Fecha">
<input class="form-control my-2" id="time" placeholder="Hora">
<input class="form-control my-2" id="doors" placeholder="Apertura puertas">
<input class="form-control my-2" id="age" placeholder="Edad mínima">

<button class="btn-ticket mt-3" onclick="saveEvent()">Guardar Evento</button>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

let isAdmin=false;

/* EVENTOS INICIALES */
if(!localStorage.getItem("events")){
localStorage.setItem("events",JSON.stringify([
{title:"Concierto Sinfónico",place:"Movistar Arena",date:"9 de Abril",time:"8:30 p.m.",doors:"6:00 p.m.",age:"14 Años"},
{title:"Noche Acústica",place:"Teatro Mayor",date:"28 de Junio",time:"7:00 p.m.",doors:"5:30 p.m.",age:"12 Años"},
{title:"Show Internacional",place:"Arena Medellín",date:"15 de Agosto",time:"9:00 p.m.",doors:"7:00 p.m.",age:"18 Años"}
]));
}

let events=JSON.parse(localStorage.getItem("events"));

function renderEvents(){
let container=document.getElementById("eventsContainer");
container.innerHTML="";

events.forEach((e,index)=>{
container.innerHTML+=`
<div class="event-card">
<div class="event-title">${e.title}</div>

<div class="event-info">
<div class="info-item"><i class="bi bi-geo-alt"></i><div><strong>Lugar:</strong><br>${e.place}</div></div>
<div class="info-item"><i class="bi bi-calendar"></i><div><strong>Fecha:</strong><br>${e.date}</div></div>
<div class="info-item"><i class="bi bi-clock"></i><div><strong>Hora:</strong><br>${e.time}</div></div>
<div class="info-item"><i class="bi bi-door-open"></i><div><strong>Apertura:</strong><br>${e.doors}</div></div>
<div class="info-item"><i class="bi bi-person"></i><div><strong>Edad Mínima:</strong><br>${e.age}</div></div>
</div>

<div class="mt-3 d-flex justify-content-between align-items-center">

<button class="btn-ticket" onclick="buyTicket('${e.title}')">
Comprar Ticket
</button>

${isAdmin ? `
<div class="admin-actions">
<button class="btn btn-success btn-sm" onclick="openCreate()">Crear</button>
<button class="btn btn-warning btn-sm" onclick="editEvent(${index})">Editar</button>
<button class="btn btn-danger btn-sm" onclick="deleteEvent(${index})">Eliminar</button>
</div>` : ``}

</div>
</div>
`;
});
}

renderEvents();

/* LOGIN */
function openLogin(){
new bootstrap.Modal(document.getElementById('loginModal')).show();
}

function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="adminfg" && p==="FG2026VIP"){
isAdmin=true;
bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
document.getElementById("logoutBtn").style.display="block";
alert("Bienvenida Administradora");
renderEvents();
}else{
alert("Credenciales incorrectas");
}
}

function logout(){
isAdmin=false;
document.getElementById("logoutBtn").style.display="none";
alert("Sesión cerrada correctamente");
renderEvents();
}

/* CRUD */
function openCreate(){
clearForm();
new bootstrap.Modal(document.getElementById('crudModal')).show();
}

function saveEvent(){
let id=document.getElementById("eventId").value;

let newEvent={
title:title.value,
place:place.value,
date:date.value,
time:time.value,
doors:doors.value,
age:age.value
};

if(id===""){
events.push(newEvent);
}else{
events[id]=newEvent;
}

localStorage.setItem("events",JSON.stringify(events));
bootstrap.Modal.getInstance(document.getElementById('crudModal')).hide();
clearForm();
renderEvents();
}

function editEvent(index){
let e=events[index];
eventId.value=index;
title.value=e.title;
place.value=e.place;
date.value=e.date;
time.value=e.time;
doors.value=e.doors;
age.value=e.age;
new bootstrap.Modal(document.getElementById('crudModal')).show();
}

function deleteEvent(index){
if(confirm("¿Eliminar evento?")){
events.splice(index,1);
localStorage.setItem("events",JSON.stringify(events));
renderEvents();
}
}

function clearForm(){
eventId.value="";
title.value="";
place.value="";
date.value="";
time.value="";
doors.value="";
age.value="";
}

/* WHATSAPP */
function buyTicket(eventTitle){

let phone = "573162979230"; // ← CAMBIA POR TU NÚMERO
let message = `Hola, quiero información sobre boletas disponibles y precios para el evento "${eventTitle}".`;

let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

window.open(url, "_blank");
}

</script>

</body>
</html>
