<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
background:#000;
color:#f5f5dc;
font-family:'Segoe UI',sans-serif;
}

/* ANIMACIÓN DORADA */
@keyframes goldFlash{
0%{box-shadow:0 0 0px #d4af37;}
50%{box-shadow:0 0 60px #ffd700;}
100%{box-shadow:0 0 0px #d4af37;}
}
.gold-animate{
animation:goldFlash 1.5s ease;
}

/* NAVBAR IGUAL CONTACTO */
.navbar{
background:#000;
box-shadow:0 0 15px rgba(212,175,55,0.4);
padding:8px 0;
}
.logo-img{
height:110px;
}
.nav-link{color:#f5f5dc !important;}
.nav-link:hover{color:#d4af37 !important;}

/* ADMIN */
.admin-btn{
position:fixed;
right:0;
top:50%;
transform:translateY(-50%);
background:linear-gradient(45deg,#d4af37,#fff3b0);
color:#000;
padding:12px 25px;
border-radius:10px 0 0 10px;
cursor:pointer;
font-weight:bold;
z-index:9999;
}
.logout-btn{
position:fixed;
right:0;
top:60%;
transform:translateY(-50%);
background:#8b0000;
color:#fff;
padding:12px 25px;
border-radius:10px 0 0 10px;
display:none;
cursor:pointer;
z-index:9999;
}

/* HEADER */
.header{
margin-top:170px;
text-align:center;
margin-bottom:50px;
}
.header h1{color:#d4af37;letter-spacing:4px;}

/* EVENTOS */
.event-card{
background:#0d0d0d;
border-left:4px solid #d4af37;
padding:25px;
margin-bottom:25px;
border-radius:12px;
}
.event-info{
background:#f1f1f1;
color:#000;
padding:15px;
border-radius:8px;
display:flex;
flex-wrap:wrap;
gap:30px;
}
.btn-ticket{
background:linear-gradient(45deg,#d4af37,#fff3b0);
border:none;
padding:8px 18px;
font-weight:bold;
}

/* FOOTER */
.footer{
background:#111;
padding:25px;
text-align:center;
margin-top:50px;
}

/* WHATSAPP */
.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
text-align:center;
color:#fff;
font-size:28px;
line-height:60px;
}

/* MODALS */
.modal-content{
background:#111;
color:#fff;
border:1px solid #d4af37;
border-radius:15px;
}
.modal-header,.modal-footer{
border-color:#d4af37;
}
input{
background:#000 !important;
color:#fff !important;
border:1px solid #d4af37 !important;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg fixed-top">

<li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
</ul>
</div>
</div>
</nav>

<div class="admin-btn" onclick="openLogin()">ADMINISTRAR</div>
<div id="logoutBtn" class="logout-btn" onclick="logout()">CERRAR SESIÓN</div>

<div class="container">
<div class="header">
<h1>TICKETS OFICIALES</h1>
<p>Experiencias Exclusivas · Felipe Guzmán</p>
</div>
<div id="eventsContainer"></div>
</div>

<div class="footer">
© 2026 Felipe Guzman Official
</div>

<a href="https://wa.me/573162979230" class="whatsapp-float" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<!-- LOGIN MODAL -->
<div class="modal fade" id="loginModal">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title text-warning">INICIAR SESIÓN</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<input type="text" id="loginUser" class="form-control mb-3" placeholder="Usuario">
<input type="password" id="loginPass" class="form-control mb-3" placeholder="Contraseña">
<div id="loginMessage" class="text-center fw-bold"></div>
</div>
<div class="modal-footer">
<button class="btn btn-warning w-100" onclick="login()">Ingresar</button>
</div>
</div>
</div>
</div>

<!-- CREATE / EDIT MODAL -->
<div class="modal fade" id="eventModal">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title text-warning" id="modalTitle">CREAR EVENTO</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<input id="eTitle" class="form-control mb-2" placeholder="Título">
<input id="ePlace" class="form-control mb-2" placeholder="Lugar">
<input id="eDate" class="form-control mb-2" placeholder="Fecha">
<input id="eTime" class="form-control mb-2" placeholder="Hora">
<input id="eDoors" class="form-control mb-2" placeholder="Apertura">
<input id="eAge" class="form-control mb-2" placeholder="Edad mínima">
</div>
<div class="modal-footer">
<button class="btn btn-warning w-100" onclick="saveEvent()">Guardar</button>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
let isAdmin=false;
let editIndex=null;

if(!localStorage.getItem("events")){
localStorage.setItem("events",JSON.stringify([
{title:"Concierto Sinfónico",place:"Concha Acústica",date:"9 Abril",time:"8:30pm",doors:"6:00pm",age:"14+"}
]));
}
let events=JSON.parse(localStorage.getItem("events"));

function renderEvents(){
let container=document.getElementById("eventsContainer");
container.innerHTML="";
events.forEach((e,index)=>{
container.innerHTML+=`
<div class="event-card">
<h4>${e.title}</h4>
<div class="event-info">
<div><b>Lugar:</b> ${e.place}</div>
<div><b>Fecha:</b> ${e.date}</div>
<div><b>Hora:</b> ${e.time}</div>
<div><b>Apertura:</b> ${e.doors}</div>
<div><b>Edad:</b> ${e.age}</div>
</div>
<div class="mt-3 d-flex justify-content-between">
<button class="btn-ticket" onclick="buyTicket('${e.title}')">Comprar Ticket</button>
${isAdmin ? `
<div>
<button class="btn btn-success btn-sm" onclick="openCreate()">Crear</button>
<button class="btn btn-warning btn-sm" onclick="openEdit(${index})">Editar</button>
<button class="btn btn-danger btn-sm" onclick="deleteEvent(${index})">Eliminar</button>
</div>`:''}
</div>
</div>`;
});
}
renderEvents();

/* LOGIN */
function openLogin(){ new bootstrap.Modal(loginModal).show(); }

function login(){
if(loginUser.value==="adminfg" && loginPass.value==="FG2026VIP"){
isAdmin=true;
document.body.classList.add("gold-animate");
loginMessage.innerHTML="✨ Bienvenida Administradora ✨";
loginMessage.className="text-success text-center fw-bold";
logoutBtn.style.display="block";
setTimeout(()=>{bootstrap.Modal.getInstance(loginModal).hide();renderEvents();},1200);
}else{
loginMessage.innerHTML="Credenciales incorrectas";
loginMessage.className="text-danger text-center fw-bold";
}
}

function logout(){
isAdmin=false;
logoutBtn.style.display="none";
renderEvents();
}

/* CREATE */
function openCreate(){
editIndex=null;
modalTitle.innerText="CREAR EVENTO";
eTitle.value=ePlace.value=eDate.value=eTime.value=eDoors.value=eAge.value="";
new bootstrap.Modal(eventModal).show();
}

/* EDIT */
function openEdit(index){
editIndex=index;
let e=events[index];
modalTitle.innerText="EDITAR EVENTO";
eTitle.value=e.title;
ePlace.value=e.place;
eDate.value=e.date;
eTime.value=e.time;
eDoors.value=e.doors;
eAge.value=e.age;
new bootstrap.Modal(eventModal).show();
}

/* SAVE */
function saveEvent(){
let newEvent={
title:eTitle.value,
place:ePlace.value,
date:eDate.value,
time:eTime.value,
doors:eDoors.value,
age:eAge.value
};
if(editIndex===null){
events.push(newEvent);
}else{
events[editIndex]=newEvent;
}
localStorage.setItem("events",JSON.stringify(events));
bootstrap.Modal.getInstance(eventModal).hide();
renderEvents();
}

function deleteEvent(index){
if(confirm("¿Eliminar evento?")){
events.splice(index,1);
localStorage.setItem("events",JSON.stringify(events));
renderEvents();
}
}

function buyTicket(title){
window.open(`https://wa.me/573162979230?text=Hola quiero info del evento ${title}`,"_blank");
}
</script>

</body>
